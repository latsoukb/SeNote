name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build
        working-directory: frontend
        env:
          PUBLIC_URL: /SeNote
          REACT_APP_USE_BACKEND: 'false'
          REACT_APP_BETA_PIN: ${{ secrets.REACT_APP_BETA_PIN }}
          REACT_APP_JOKKO_SYNC_URL: ${{ secrets.REACT_APP_JOKKO_SYNC_URL }}
          REACT_APP_GOOGLE_WEB_CLIENT_ID: ${{ secrets.REACT_APP_GOOGLE_WEB_CLIENT_ID }}
          REACT_APP_GOOGLE_TOKEN_URL: ${{ secrets.REACT_APP_GOOGLE_TOKEN_URL }}
          CI: false
        run: npm run build

      - name: Inject Google OAuth into app-config.json
        working-directory: frontend
        env:
          REACT_APP_GOOGLE_WEB_CLIENT_ID: ${{ secrets.REACT_APP_GOOGLE_WEB_CLIENT_ID }}
          REACT_APP_GOOGLE_TOKEN_URL: ${{ secrets.REACT_APP_GOOGLE_TOKEN_URL }}
        run: |
          node -e "
          const fs = require('fs');
          const path = 'build/app-config.json';
          const cfg = JSON.parse(fs.readFileSync(path, 'utf8'));
          const web = (process.env.REACT_APP_GOOGLE_WEB_CLIENT_ID || '').trim();
          const tokenUrl = (process.env.REACT_APP_GOOGLE_TOKEN_URL || '').trim();
          if (web) cfg.googleWebClientId = web;
          if (tokenUrl) cfg.googleTokenExchangeUrl = tokenUrl;
          fs.writeFileSync(path, JSON.stringify(cfg, null, 2) + '\n');
          "
          node ../scripts/inject-app-config-update.mjs build/app-config.json

      - name: Bundle APK for in-app update (CORS-safe URL)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION_NAME=$(grep -oP 'versionName "\K[^"]+' frontend/android/app/build.gradle)
          TAG="v${VERSION_NAME}"
          echo "Attente release ${TAG} (build APK parallele)..."
          for i in $(seq 1 30); do
            if gh release download "$TAG" --repo "${{ github.repository }}" \
              --pattern 'SeNote-tablet.apk' \
              --dir frontend/build \
              --clobber 2>/dev/null; then
              echo "APK ${TAG} recupere (tentative ${i})"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Release ${TAG} introuvable apres 7 min"
              exit 1
            fi
            sleep 15
          done
          jarsigner -verify -verbose -certs frontend/build/SeNote-tablet.apk > /tmp/apk-sig.txt 2>&1 || true
          if grep -q "Android Debug" /tmp/apk-sig.txt; then
            echo "ERREUR: APK debug detecte sur Pages — refus de deployer"
            exit 1
          fi
          if ! grep -q "SeNote Tablet" /tmp/apk-sig.txt; then
            echo "ERREUR: signature release SeNote Tablet absente"
            exit 1
          fi
          echo "Signature release OK"

      - name: SPA fallback (routes React)
        run: cp frontend/build/index.html frontend/build/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
