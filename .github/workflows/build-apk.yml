name: Build APK Android

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'frontend/src/**'
      - 'frontend/public/**'
      - 'frontend/package.json'
      - 'frontend/capacitor.config.json'
      - 'frontend/android/**'
      - '.github/workflows/build-apk.yml'
      - 'scripts/inject-app-config-update.mjs'

permissions:
  contents: write
  actions: write

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build web (mode APK tablette)
        working-directory: frontend
        env:
          REACT_APP_KIOSK_MODE: 'true'
          REACT_APP_USE_BACKEND: 'false'
          REACT_APP_GOOGLE_CLIENT_ID: ${{ secrets.REACT_APP_GOOGLE_CLIENT_ID }}
          REACT_APP_GOOGLE_WEB_CLIENT_ID: ${{ secrets.REACT_APP_GOOGLE_WEB_CLIENT_ID }}
          REACT_APP_GOOGLE_TOKEN_URL: ${{ secrets.REACT_APP_GOOGLE_TOKEN_URL }}
          REACT_APP_JOKKO_SYNC_URL: ${{ secrets.REACT_APP_JOKKO_SYNC_URL }}
          REACT_APP_UPDATE_CONFIG_URL: 'https://latsoukb.github.io/SeNote/app-config.json'
          PUBLIC_URL: ''
          CI: false
        run: npm run build

      - name: Inject Google config into app-config.json
        working-directory: frontend
        env:
          REACT_APP_GOOGLE_WEB_CLIENT_ID: ${{ secrets.REACT_APP_GOOGLE_WEB_CLIENT_ID }}
          REACT_APP_GOOGLE_CLIENT_ID: ${{ secrets.REACT_APP_GOOGLE_CLIENT_ID }}
          REACT_APP_GOOGLE_TOKEN_URL: ${{ secrets.REACT_APP_GOOGLE_TOKEN_URL }}
        run: |
          node -e "
          const fs = require('fs');
          const path = 'build/app-config.json';
          const cfg = JSON.parse(fs.readFileSync(path, 'utf8'));
          const web = (process.env.REACT_APP_GOOGLE_WEB_CLIENT_ID || '').trim();
          const native = (process.env.REACT_APP_GOOGLE_CLIENT_ID || '').trim();
          const tokenUrl = (process.env.REACT_APP_GOOGLE_TOKEN_URL || '').trim();
          if (web) cfg.googleWebClientId = web;
          if (native) cfg.googleNativeClientId = native;
          if (tokenUrl) cfg.googleTokenExchangeUrl = tokenUrl;
          fs.writeFileSync(path, JSON.stringify(cfg, null, 2) + '\n');
          "
          if [ -n "$REACT_APP_GOOGLE_WEB_CLIENT_ID" ]; then
            export WEB_ID="$REACT_APP_GOOGLE_WEB_CLIENT_ID"
            node -e "
            const fs = require('fs');
            const p = 'capacitor.config.json';
            const c = JSON.parse(fs.readFileSync(p, 'utf8'));
            const web = process.env.WEB_ID.trim();
            c.plugins = c.plugins || {};
            c.plugins.GoogleAuth = c.plugins.GoogleAuth || {};
            c.plugins.GoogleAuth.serverClientId = web;
            c.plugins.GoogleAuth.clientId = web;
            c.plugins.GoogleAuth.scopes = [
              'https://www.googleapis.com/auth/drive.file',
              'https://www.googleapis.com/auth/drive.appdata',
              'https://www.googleapis.com/auth/userinfo.email',
            ];
            fs.writeFileSync(p, JSON.stringify(c, null, 2) + '\n');
            "
            node -e "
            const fs = require('fs');
            const xmlPath = 'android/app/src/main/res/values/strings.xml';
            let xml = fs.readFileSync(xmlPath, 'utf8');
            const web = process.env.WEB_ID.trim();
            xml = xml.replace(
              /<string name=\"server_client_id\"[^>]*>[^<]*<\\/string>/,
              '<string name=\"server_client_id\" translatable=\"false\">' + web + '</string>'
            );
            fs.writeFileSync(xmlPath, xml);
            "
          fi
          node ../scripts/inject-app-config-update.mjs build/app-config.json

      - name: Sync Capacitor
        working-directory: frontend
        run: npx cap sync android

      - name: Build APK (release, signature fixe)
        working-directory: frontend/android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION_NAME=$(grep -oP 'versionName "\K[^"]+' frontend/android/app/build.gradle)
          VERSION_CODE=$(grep -oP 'versionCode \K\d+' frontend/android/app/build.gradle)
          APK_SRC="frontend/android/app/build/outputs/apk/release/app-release.apk"
          cp "$APK_SRC" /tmp/SeNote-tablet.apk
          TAG="v${VERSION_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" /tmp/SeNote-tablet.apk --clobber
          else
            gh release create "$TAG" /tmp/SeNote-tablet.apk \
              --title "SeNote ${VERSION_NAME}" \
              --notes "Build ${VERSION_CODE} — mise à jour via Paramètres → Vérifier les mises à jour dans l'app."
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SeNote-apk
          path: frontend/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30

      - name: Sync APK on GitHub Pages
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-pages.yml --repo "${{ github.repository }}"
