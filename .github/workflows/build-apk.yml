name: Build APK Android

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'frontend/src/**'
      - 'frontend/public/**'
      - 'frontend/package.json'
      - 'frontend/capacitor.config.json'
      - 'frontend/android/**'
      - '.github/workflows/build-apk.yml'

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build web (mode APK tablette)
        working-directory: frontend
        env:
          REACT_APP_KIOSK_MODE: 'true'
          REACT_APP_USE_BACKEND: 'false'
          REACT_APP_GOOGLE_CLIENT_ID: ${{ secrets.REACT_APP_GOOGLE_CLIENT_ID }}
          REACT_APP_GOOGLE_WEB_CLIENT_ID: ${{ secrets.REACT_APP_GOOGLE_WEB_CLIENT_ID }}
          REACT_APP_GOOGLE_TOKEN_URL: ${{ secrets.REACT_APP_GOOGLE_TOKEN_URL }}
          REACT_APP_JOKKO_SYNC_URL: ${{ secrets.REACT_APP_JOKKO_SYNC_URL }}
          PUBLIC_URL: ''
          CI: false
        run: npm run build

      - name: Inject Google config into app-config.json
        working-directory: frontend
        env:
          REACT_APP_GOOGLE_WEB_CLIENT_ID: ${{ secrets.REACT_APP_GOOGLE_WEB_CLIENT_ID }}
          REACT_APP_GOOGLE_CLIENT_ID: ${{ secrets.REACT_APP_GOOGLE_CLIENT_ID }}
          REACT_APP_GOOGLE_TOKEN_URL: ${{ secrets.REACT_APP_GOOGLE_TOKEN_URL }}
        run: |
          node -e "
          const fs = require('fs');
          const path = 'build/app-config.json';
          const cfg = JSON.parse(fs.readFileSync(path, 'utf8'));
          const web = (process.env.REACT_APP_GOOGLE_WEB_CLIENT_ID || '').trim();
          const native = (process.env.REACT_APP_GOOGLE_CLIENT_ID || '').trim();
          const tokenUrl = (process.env.REACT_APP_GOOGLE_TOKEN_URL || '').trim();
          if (web) cfg.googleWebClientId = web;
          if (native) cfg.googleNativeClientId = native;
          if (tokenUrl) cfg.googleTokenExchangeUrl = tokenUrl;
          fs.writeFileSync(path, JSON.stringify(cfg, null, 2) + '\n');
          "
          if [ -n "$REACT_APP_GOOGLE_WEB_CLIENT_ID" ]; then
            node -e "
            const fs = require('fs');
            const p = 'capacitor.config.json';
            const c = JSON.parse(fs.readFileSync(p, 'utf8'));
            c.plugins = c.plugins || {};
            c.plugins.GoogleAuth = c.plugins.GoogleAuth || {};
            c.plugins.GoogleAuth.serverClientId = process.env.REACT_APP_GOOGLE_WEB_CLIENT_ID.trim();
            fs.writeFileSync(p, JSON.stringify(c, null, 2) + '\n');
            "
          fi

      - name: Sync Capacitor
        working-directory: frontend
        run: npx cap sync android

      - name: Build APK (debug)
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SeNote-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
